name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      # Setup Nodeアクションが内部でYarnを呼び出してキャッシュ設定をする前に、Corepackを有効化する
      - name: Enable Corepack
        run: corepack enable
        
      # Corepack有効化後にNode.jsのセットアップとYarnのキャッシュ設定を行う
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          
      # 依存関係のインストール（Yarn v4以降の推奨仕様に合わせて --immutable を使用）
      - name: Install dependencies
        run: yarn install --immutable
        
      - name: Build
        run: yarn build
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4